<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NBA Doha Hotspot Manager</title><link href="https://api.mapbox.com/mapbox-gl-js/v3.25.0/mapbox-gl.css" rel="stylesheet"><script src="https://api.mapbox.com/mapbox-gl-js/v3.25.0/mapbox-gl.js"></script><script src="hotspots.js"></script><style>
:root{--navy:#071d49;--blue:#17408b;--red:#c8102e;--bg:#f4f6f9;--line:#d8dee8}*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--bg)}header{padding:16px 20px;color:#fff;background:var(--navy);border-bottom:5px solid var(--red)}header h1{margin:0;font-size:22px}header p{margin:5px 0 0;opacity:.75;font-size:12px}main{display:grid;grid-template-columns:1.2fr .8fr;min-height:calc(100vh - 82px)}#map{min-height:700px}aside{padding:18px;background:#fff;overflow:auto}section{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--line)}h2{margin:0 0 12px;color:var(--navy);font-size:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}label{display:block;margin-bottom:5px;font-size:10px;font-weight:bold;text-transform:uppercase}input,textarea,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:7px}textarea{min-height:80px}button{padding:10px 13px;border:0;border-radius:7px;color:#fff;background:var(--blue);font-weight:bold;cursor:pointer}button.alt{background:#e8edf5;color:var(--navy)}button.red{background:var(--red)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.row{display:grid;grid-template-columns:35px 1fr auto;gap:8px;align-items:center;padding:9px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px}.num{display:grid;place-items:center;width:32px;height:32px;border-radius:50%;background:var(--navy);color:#fff;font-weight:bold}.small{padding:7px 9px;font-size:11px}.msg{margin-top:10px;font-size:12px;color:#16794b}@media(max-width:900px){main{grid-template-columns:1fr}#map{min-height:500px}}@media(max-width:560px){.grid{grid-template-columns:1fr}.full{grid-column:auto}}
</style></head><body><header><h1>NBA Doha Hotspot Manager</h1><p>Click the map, edit the details, then download a replacement hotspots.js file.</p></header><main><div id="map"></div><aside><section><h2>Hotspot details</h2><div class="grid"><div><label>Number</label><input id="number"></div><div><label>Venue type</label><select id="type"><option value="Experience|experience">Experience</option><option value="Basketball Activity|activity">Basketball Activity</option><option value="Food and Drink|food">Food and Drink</option><option value="Shopping Mall|retail">Shopping Mall</option><option value="Merchandise|retail">Merchandise</option><option value="Entertainment|experience">Entertainment</option><option value="Other|other">Other</option></select></div><div class="full"><label>Name</label><input id="title"></div><div class="full"><label>Short label</label><input id="short"></div><div class="full"><label>Description</label><textarea id="desc"></textarea></div><div class="full"><label>Timings</label><input id="time"></div><div><label>Longitude</label><input id="lng" readonly></div><div><label>Latitude</label><input id="lat" readonly></div><div class="full"><label>Button label</label><input id="btn"></div><div class="full"><label>Website link</label><input id="link"></div></div><div class="actions"><button id="save">Add hotspot</button><button id="new" class="alt">New</button><button id="del" class="red" hidden>Delete selected</button></div><div id="msg" class="msg"></div></section><section><h2>Current hotspots</h2><input id="search" placeholder="Search hotspots"><div id="list" style="margin-top:10px"></div><div class="actions"><button id="download">Download hotspots.js</button><button id="import" class="alt">Import hotspots.js</button></div><input id="file" type="file" accept=".js,.txt" hidden></section></aside></main><script>
const TOKEN='pk.eyJ1IjoiYmVuc2NyYXdmb3JkIiwiYSI6ImNtcm5mcWFmdjAzcjkyenBoYnVjM2Zja2wifQ.KJsiKGVn78MS8tUgSCOryg',KEY='nba-doha-manager-v1';let items=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(hotspots),selected=null,picker,markers=[];const $=id=>document.getElementById(id),f={number:$('number'),type:$('type'),title:$('title'),short:$('short'),desc:$('desc'),time:$('time'),lng:$('lng'),lat:$('lat'),btn:$('btn'),link:$('link')};mapboxgl.accessToken=TOKEN;const map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/standard',center:[51.531,25.286],zoom:12.8,pitch:0,bearing:0,projection:'mercator',config:{basemap:{lightPreset:'night',showPointOfInterestLabels:true,showTransitLabels:false}}});map.setMaxPitch(0);map.dragRotate.disable();map.touchZoomRotate.disableRotation();map.scrollZoom.enable();map.addControl(new mapboxgl.NavigationControl({showCompass:false}),'bottom-right');
function coords(lng,lat){f.lng.value=(+lng).toFixed(6);f.lat.value=(+lat).toFixed(6)}function place(lng,lat){coords(lng,lat);if(!picker){picker=new mapboxgl.Marker({color:'#39ff14',draggable:true}).setLngLat([lng,lat]).addTo(map);picker.on('dragend',()=>{const p=picker.getLngLat();coords(p.lng,p.lat)})}else picker.setLngLat([lng,lat])}map.on('click',e=>place(e.lngLat.lng,e.lngLat.lat));
function renderMarkers(){markers.forEach(m=>m.remove());markers=[];items.forEach((x,i)=>{const b=document.createElement('button');b.textContent=x.number;b.style.cssText='width:36px;height:36px;border-radius:50%;border:3px solid white;background:#f28c28;color:white;font-weight:bold;box-shadow:0 0 0 3px #c8102e';b.onclick=()=>edit(i);markers.push(new mapboxgl.Marker({element:b}).setLngLat(x.coordinates).addTo(map))})}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function render(){const q=$('search').value.toLowerCase();$('list').innerHTML='';items.forEach((x,i)=>{if(q&&!x.title.toLowerCase().includes(q))return;const r=document.createElement('div');r.className='row';r.innerHTML=`<div class="num">${esc(x.number)}</div><div><b>${esc(x.title)}</b><br><small>${esc(x.category)}</small></div><div><button class="small" data-e>Edit</button> <button class="small red" data-d>×</button></div>`;r.querySelector('[data-e]').onclick=()=>edit(i);r.querySelector('[data-d]').onclick=()=>remove(i);$('list').appendChild(r)})}
function edit(i){selected=i;const x=items[i];f.number.value=x.number;f.title.value=x.title;f.short.value=x.shortLabel;f.desc.value=x.description;f.time.value=x.time;f.lng.value=(+x.coordinates[0]).toFixed(6);f.lat.value=(+x.coordinates[1]).toFixed(6);f.btn.value=x.buttonLabel;f.link.value=x.link;const v=[...f.type.options].find(o=>o.value===x.category+'|'+x.filterCategory);f.type.value=v?v.value:'Other|other';$('save').textContent='Update hotspot';$('del').hidden=false;place(x.coordinates[0],x.coordinates[1]);map.flyTo({center:x.coordinates,zoom:14})}
function fresh(){selected=null;Object.values(f).forEach(x=>x.value='');f.type.value='Experience|experience';f.number.value=String(items.length+1);f.link.value='#';$('save').textContent='Add hotspot';$('del').hidden=true;if(picker){picker.remove();picker=null}}
function readForm(){const [category,filterCategory]=f.type.value.split('|');return{number:f.number.value.trim(),title:f.title.value.trim(),shortLabel:f.short.value.trim()||f.title.value.trim(),category,filterCategory,description:f.desc.value.trim(),time:f.time.value.trim(),coordinates:[+f.lng.value,+f.lat.value],buttonLabel:f.btn.value.trim(),link:f.link.value.trim()}}
function save(){const x=readForm();if(!x.number||!x.title||!x.description||!x.time||!Number.isFinite(x.coordinates[0])||!Number.isFinite(x.coordinates[1])||!x.buttonLabel||!x.link){$('msg').textContent='Please complete every field and click the map.';return}if(selected===null)items.push(x);else items[selected]=x;localStorage.setItem(KEY,JSON.stringify(items));render();renderMarkers();fresh();$('msg').textContent='Saved.'}
function remove(i){if(!confirm('Delete '+items[i].title+'?'))return;items.splice(i,1);localStorage.setItem(KEY,JSON.stringify(items));render();renderMarkers();fresh()}
function quote(s){return JSON.stringify(String(s??''))}function output(){return 'const hotspots = [
'+items.map(x=>`  {
    number: ${quote(x.number)},
    title: ${quote(x.title)},
    shortLabel: ${quote(x.shortLabel)},
    category: ${quote(x.category)},
    filterCategory: ${quote(x.filterCategory)},
    description: ${quote(x.description)},
    time: ${quote(x.time)},
    coordinates: [${(+x.coordinates[0]).toFixed(6)}, ${(+x.coordinates[1]).toFixed(6)}],
    buttonLabel: ${quote(x.buttonLabel)},
    link: ${quote(x.link)}
  }`).join(',
')+'
];
'}
$('save').onclick=save;$('new').onclick=fresh;$('del').onclick=()=>selected!==null&&remove(selected);$('search').oninput=render;$('download').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([output()],{type:'text/javascript'}));a.download='hotspots.js';a.click();URL.revokeObjectURL(a.href)};$('import').onclick=()=>$('file').click();$('file').onchange=async e=>{const t=await e.target.files[0].text(),m=t.match(/const\s+hotspots\s*=\s*(\[[\s\S]*\])\s*;?/);if(!m)return alert('No hotspot array found');items=Function('return ('+m[1]+')')();localStorage.setItem(KEY,JSON.stringify(items));render();renderMarkers();fresh()};map.on('load',renderMarkers);render();fresh();
</script></body></html>
